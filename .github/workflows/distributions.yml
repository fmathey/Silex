name: Distribution matrix

on:
  # This matrix is an occasional portability check, not a development gate.
  # Run it manually when Linux/Windows/macOS distributions need validation.
  workflow_dispatch:
    inputs:
      preserve_artifacts:
        description: Preserve the generated host distributions
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  distribution:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86-64
            runner: ubuntu-24.04
            artifact: silex-linux-x86_64
          - name: macOS ARM64
            runner: macos-15
            artifact: silex-macos-aarch64
          - name: Windows x86-64
            runner: windows-2025
            artifact: silex-windows-x86_64

    defaults:
      run:
        working-directory: Toolchain

    steps:
      - name: Check out Silex
        uses: actions/checkout@v6

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Run toolchain tests
        run: zig build test

      - name: Run native smokes
        shell: bash
        run: zig build smoke 2>&1 | tee native-smoke.log

      - name: Report native smoke failure
        if: failure() && hashFiles('Toolchain/native-smoke.log') != ''
        shell: bash
        run: |
          details="$(tail -n 100 native-smoke.log)"
          details="${details//'%'/'%25'}"
          details="${details//$'\r'/'%0D'}"
          details="${details//$'\n'/'%0A'}"
          echo "::error title=Native smoke failure::$details"

      - name: Run cross-compilation smokes
        run: zig build cross-smoke

      - name: Run native-source cross-compilation smoke
        run: zig build cross-native-smoke

      - name: Build and verify host distribution
        run: zig build dist-check

      - name: Preserve host distribution
        if: ${{ inputs.preserve_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: Toolchain/zig-out/dist/silex-*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
